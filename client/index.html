<!doctype html>
<html lang="en">
  <head>
    <!-- ================= CORE ================= -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AfyaLock</title>

    <!-- ================= SEO ================= -->
    <meta name="description" content="AfyaLock is a secure hospital management system for managing patients, medical records, diagnostics and staff operations." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="AfyaLock" />

    <!-- ================= THEME ================= -->
    <meta name="theme-color" content="#05254d" />
    <meta name="application-name" content="AfyaLock" />

    <!-- ================= PERFORMANCE ================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ================= FAVICONS ================= -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ================= PWA ================= -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ================= OPEN GRAPH ================= -->
    <meta property="og:title" content="AfyaLock" />
    <meta property="og:description" content="Secure hospital management system for patient records, diagnostics and staff operations." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/preview-image.png" />

    <!-- Security headers should be set from backend in production -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  </head>

  <body>
    <!-- ================= SPLASH SCREEN ================= -->
    <div id="app-splash">
      <div class="splash-content">
        <h1>AfyaLock</h1>
        <div class="loader"></div>
      </div>
    </div>

    <!-- ================= REACT ROOT ================= -->
    <div id="root"></div>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- ================= REACT ENTRY ================= -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- ================= SPLASH STYLES ================= -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        background: #f4f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .splash-content {
        text-align: center;
        font-family: sans-serif;
        color: #05254d;
      }

      .loader {
        margin: 20px auto 0;
        width: 40px;
        height: 40px;
        border: 4px solid #e0e0e0;
        border-top: 4px solid #05254d;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>
